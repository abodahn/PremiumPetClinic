services:
  - type: web
    name: premium-pet-clinic
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: VETAPP_SECRET_KEY
        generateValue: true        # Render auto-generates a secure random value
      - key: DATABASE_URL
        fromDatabase:
          name: premium-pet-clinic-db
          property: connectionString
      - key: VETAPP_ADMIN_USER
        value: Admin
      - key: VETAPP_ADMIN_PASS
        value: "1234"              # Change this after first login!
      - key: VETAPP_TITLE
        value: Premium Pet Clinic

databases:
  - name: premium-pet-clinic-db
    databaseName: petclinic
    user: petclinic
    plan: free
